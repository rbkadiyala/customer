name: Build and Test Spring Boot Application

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3  # Use the latest version

      - name: Set up JDK 18
        uses: actions/setup-java@v3  # Use the latest version
        with:
          java-version: '18'
          distribution: 'adopt-openjdk'

      - name: Cache Maven packages
        uses: actions/cache@v3  # Use the latest version
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and test with Maven
        run: mvn --batch-mode --update-snapshots --no-transfer-progress clean package

      - name: Upload JAR file
        uses: actions/upload-artifact@v4  # Use the latest version
        with:
          name: app-jar
          path: target/*.jar
