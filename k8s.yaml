apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-app-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: customer-app
  template:
    metadata:
      labels:
        app: customer-app
    spec:
      containers:
        - name: customer-container
          image: 761018885188.dkr.ecr.us-east-1.amazonaws.com/customer-eks:latest
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: customer-app-service
spec:
  selector:
    app: customer-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: LoadBalancer